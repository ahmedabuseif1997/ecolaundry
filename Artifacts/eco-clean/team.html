<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Eco-Clean — Team App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f2;min-height:100vh;}
/* Login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-card{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.login-logo{width:56px;height:56px;background:#0a2e23;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px;color:#5DCAA5;}
.login-title{font-size:18px;font-weight:500;color:#0a2e23;margin-bottom:4px;}
.login-sub{font-size:13px;color:#888;margin-bottom:1.5rem;}
.login-card input{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:10px;font-size:16px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:12px;}
.login-card input:focus{border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,.12);}
.login-btn{width:100%;padding:13px;background:#0a2e23;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;}
.login-btn:hover{background:#0F6E56;}
.login-err{font-size:12px;color:#E24B4A;margin-top:8px;display:none;}
/* App */
.app{display:none;}
.topbar{background:#0a2e23;padding:.9rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-logo{font-size:15px;font-weight:500;color:#fff;}
.tb-logo span{color:#5DCAA5;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
.tb-date{font-size:12px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);padding:5px 12px;border-radius:20px;}
.tb-right{display:flex;align-items:center;gap:8px;}
.tb-btn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;}
.tb-btn:hover{background:rgba(255,255,255,.2);}
.wrap{max-width:680px;margin:0 auto;padding:1rem;}
/* Stats strip */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.stat{background:#fff;border-radius:12px;padding:.9rem;text-align:center;border:0.5px solid #e8e8e8;}
.stat-n{font-size:22px;font-weight:500;color:#0a2e23;}
.stat-l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;}
/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.date-nav input{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;}
.date-nav input:focus{border-color:#1D9E75;}
.dnav-btn{padding:9px 14px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:13px;}
.dnav-btn:hover{background:#f5f5f5;}
/* Job cards */
.jobs-list{display:flex;flex-direction:column;gap:12px;}
.job{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e8e8e8;}
.job-header{padding:1rem;border-bottom:1px solid #f5f5f5;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.job-info{}
.job-name{font-size:15px;font-weight:500;color:#0a2e23;margin-bottom:3px;}
.job-svc{font-size:12px;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:6px;}
.svc-a{background:#E1F5EE;color:#0F6E56;}
.svc-b{background:#d0f0e4;color:#085041;}
.svc-c{background:#c5ead9;color:#063d2b;}
.svc-d{background:#FAEEDA;color:#BA7517;}
.job-time{display:flex;align-items:center;gap:4px;font-size:12px;color:#888;}
.job-status{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.status-pending{background:#FFF3CD;color:#856404;}
.status-progress{background:#CCE5FF;color:#004085;}
.status-done{background:#D4EDDA;color:#155724;}
.job-body{padding:1rem;}
.job-detail{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#444;margin-bottom:8px;}
.job-detail-ico{color:#1D9E75;font-size:16px;flex-shrink:0;margin-top:1px;}
.job-phone{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.phone-link{display:flex;align-items:center;gap:5px;padding:8px 14px;background:#E1F5EE;color:#0F6E56;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;}
.wa-link{display:flex;align-items:center;gap:5px;padding:8px 14px;background:#E8F8EE;color:#25D366;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;}
.job-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-start{padding:9px 16px;background:#0a2e23;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-start:hover{background:#0F6E56;}
.btn-done{padding:9px 16px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-done:hover{background:#0F6E56;}
.btn-photo{padding:9px 16px;background:#f0f4f2;color:#0a2e23;border:1px solid #ddd;border-radius:9px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-photo:hover{background:#e8ede9;}
/* Photo upload */
.photo-section{border-top:1px solid #f5f5f5;padding:1rem;display:none;}
.photo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.photo-box{border:2px dashed #ccc;border-radius:10px;padding:1.2rem;text-align:center;cursor:pointer;position:relative;overflow:hidden;}
.photo-box:hover{border-color:#1D9E75;background:#f9fffe;}
.photo-box input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.photo-box-ico{font-size:28px;color:#ccc;margin-bottom:6px;}
.photo-box-label{font-size:11px;color:#888;}
.photo-preview{width:100%;height:100px;object-fit:cover;border-radius:8px;display:none;}
.photo-upload-btn{margin-top:10px;width:100%;padding:9px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font-size:13px;cursor:pointer;display:none;}
/* Empty */
.empty{text-align:center;padding:3rem;color:#bbb;}
.empty-ico{font-size:48px;margin-bottom:10px;color:#ddd;}
/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#0a2e23;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;display:none;z-index:999;white-space:nowrap;}
</style>
</head>
<body>

<!-- Login -->
<div class="login" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-car"></i></div>
    <div class="login-title">Eco-Clean Team</div>
    <div class="login-sub">Enter your team PIN to access today's jobs</div>
    <input type="password" id="pinInput" placeholder="• • • •" maxlength="4" oninput="if(this.value.length===4)doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="loginErr">Wrong PIN. Try again.</div>
  </div>
</div>

<!-- App -->
<div class="app" id="appScreen">
  <div class="topbar">
    <div class="tb-left">
      <div>
        <div class="tb-logo">Eco<span>-Clean</span></div>
        <div class="tb-sub">Team App</div>
      </div>
    </div>
    <div class="tb-right">
      <div class="tb-date" id="tbDate">—</div>
      <button class="tb-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="wrap">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="statTotal">0</div><div class="stat-l">Today's jobs</div></div>
      <div class="stat"><div class="stat-n" id="statDone">0</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-n" id="statLeft">0</div><div class="stat-l">Remaining</div></div>
    </div>

    <div class="date-nav">
      <button class="dnav-btn" onclick="shiftDate(-1)">‹</button>
      <input type="date" id="jobDate" onchange="loadJobs()"/>
      <button class="dnav-btn" onclick="shiftDate(1)">›</button>
    </div>

    <div class="jobs-list" id="jobsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PIN = '1234';
let jobs = [], currentDate = '';

function doLogin() {
  const p = document.getElementById('pinInput').value;
  if (p === PIN) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    init();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pinInput').value = '';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('pinInput').value = '';
}

function init() {
  const today = new Date().toISOString().split('T')[0];
  currentDate = today;
  document.getElementById('jobDate').value = today;
  document.getElementById('tbDate').textContent = new Date().toLocaleDateString('en-AE', { weekday:'short', month:'short', day:'numeric' });
  loadJobs();
}

function shiftDate(delta) {
  const d = new Date(document.getElementById('jobDate').value);
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().split('T')[0];
  document.getElementById('jobDate').value = currentDate;
  loadJobs();
}

async function loadJobs() {
  currentDate = document.getElementById('jobDate').value;
  const list = document.getElementById('jobsList');
  list.innerHTML = '<div style="text-align:center;padding:2rem;color:#aaa;font-size:13px;">Loading jobs...</div>';
  try {
    jobs = await fetch('/api/jobs?date=' + currentDate).then(r => r.json());
    updateStats();
    renderJobs();
  } catch {
    list.innerHTML = '<div class="empty"><div class="empty-ico"><i class="ti ti-wifi-off"></i></div>Could not connect to server</div>';
  }
}

function updateStats() {
  const done = jobs.filter(j => j.status === 'Completed').length;
  document.getElementById('statTotal').textContent = jobs.length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statLeft').textContent = jobs.length - done;
}

function svcClass(code) {
  return { A:'svc-a', B:'svc-b', C:'svc-c', D:'svc-d' }[code] || 'svc-a';
}

function statusClass(s) {
  if (s === 'Completed') return 'status-done';
  if (s === 'In Progress') return 'status-progress';
  return 'status-pending';
}

function renderJobs() {
  const list = document.getElementById('jobsList');
  if (jobs.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-ico"><i class="ti ti-calendar-off"></i></div>No jobs scheduled for this date</div>`;
    return;
  }
  list.innerHTML = jobs.map((j, i) => `
    <div class="job" id="job-${i}">
      <div class="job-header">
        <div class="job-info">
          <div class="job-name">${j.name || '—'}</div>
          <span class="job-svc ${svcClass(j.code)}">${j.service || '—'}</span>
          <div class="job-time"><i class="ti ti-clock" style="font-size:13px"></i> ${j.time || '—'} &nbsp;·&nbsp; <i class="ti ti-coin" style="font-size:13px"></i> ${j.total || '—'}</div>
        </div>
        <div class="job-status ${statusClass(j.status)}" id="status-${i}">${j.status || 'Pending'}</div>
      </div>
      <div class="job-body">
        <div class="job-detail"><i class="ti ti-map-pin job-detail-ico"></i>${j.emirate || ''}, ${j.address || '—'}</div>
        <div class="job-phone">
          <a class="phone-link" href="tel:${j.phone}"><i class="ti ti-phone"></i> ${j.phone || '—'}</a>
          <a class="wa-link" href="https://wa.me/${(j.phone||'').replace(/[^0-9]/g,'')}" target="_blank"><i class="ti ti-brand-whatsapp"></i> WhatsApp</a>
        </div>
        <div class="job-actions">
          ${j.status !== 'In Progress' && j.status !== 'Completed' ? `<button class="btn-start" onclick="startJob(${i})"><i class="ti ti-player-play"></i> Start job</button>` : ''}
          ${j.status !== 'Completed' ? `<button class="btn-done" onclick="completeJob(${i})"><i class="ti ti-check"></i> Mark done</button>` : '<span style="font-size:12px;color:#1D9E75;display:flex;align-items:center;gap:4px;"><i class="ti ti-circle-check-filled"></i> Completed</span>'}
          <button class="btn-photo" onclick="togglePhotos(${i})"><i class="ti ti-camera"></i> Photos</button>
        </div>
      </div>
      <div class="photo-section" id="photos-${i}">
        <div style="font-size:12px;font-weight:500;color:#444;margin-bottom:10px;">Before &amp; after photos</div>
        <div class="photo-row">
          <div class="photo-box">
            <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,${i},'before')"/>
            <img class="photo-preview" id="prev-before-${i}"/>
            <div id="box-before-${i}">
              <div class="photo-box-ico"><i class="ti ti-camera"></i></div>
              <div class="photo-box-label">Before</div>
            </div>
          </div>
          <div class="photo-box">
            <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,${i},'after')"/>
            <img class="photo-preview" id="prev-after-${i}"/>
            <div id="box-after-${i}">
              <div class="photo-box-ico"><i class="ti ti-camera-check"></i></div>
              <div class="photo-box-label">After</div>
            </div>
          </div>
        </div>
        <button class="photo-upload-btn" id="upload-btn-${i}" onclick="uploadPhotos(${i})"><i class="ti ti-upload"></i> Upload photos</button>
      </div>
    </div>
  `).join('');
}

function startJob(i) {
  jobs[i].status = 'In Progress';
  document.getElementById('status-' + i).textContent = 'In Progress';
  document.getElementById('status-' + i).className = 'job-status status-progress';
  renderJobs();
  toast('Job started!');
}

async function completeJob(i) {
  const j = jobs[i];

  // Notify server first — only update UI on success
  try {
    const res = await fetch('/api/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: j.name, phone: j.phone })
    });
    if (!res.ok) throw new Error('Server error');
  } catch {
    toast('⚠️ Could not reach server. Try again.');
    return;
  }

  jobs[i].status = 'Completed';
  updateStats();
  renderJobs();
  toast('✅ Job completed!');

  // Normalise phone: strip non-digits, then ensure UAE country code
  let phone = (j.phone || '').replace(/[^0-9]/g, '');
  if (phone.startsWith('0')) phone = '971' + phone.slice(1); // 05x → 9715x
  if (!phone) { return; } // no phone — skip WhatsApp silently

  const msg = encodeURIComponent(
    `Hi ${j.name}! ✅ Your Eco-Clean wash is complete. Thank you for choosing us! 🌿\n\n` +
    `📞 For future bookings call or WhatsApp us anytime:\n+971 58 285 9762`
  );
  // Open WhatsApp immediately (same gesture tick) — delayed open is blocked by mobile browsers
  window.open('https://wa.me/' + phone + '?text=' + msg, '_blank');
}

function togglePhotos(i) {
  const sec = document.getElementById('photos-' + i);
  sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
}

const photoData = {};

function previewPhoto(input, i, type) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('prev-' + type + '-' + i);
    prev.src = e.target.result;
    prev.style.display = 'block';
    document.getElementById('box-' + type + '-' + i).style.display = 'none';
    if (!photoData[i]) photoData[i] = {};
    photoData[i][type] = e.target.result;
    document.getElementById('upload-btn-' + i).style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function uploadPhotos(i) {
  const j = jobs[i];
  const id = (j.name || 'job').replace(/\s+/g,'_') + '_' + (j.time || '').replace(/[:\s]/g,'');
  const btn = document.getElementById('upload-btn-' + i);
  btn.textContent = 'Uploading...';
  btn.disabled = true;
  try {
    for (const type of ['before', 'after']) {
      if (photoData[i] && photoData[i][type]) {
        await fetch('/api/photo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: id, type, data: photoData[i][type] })
        });
      }
    }
    toast('📸 Photos uploaded!');
    btn.textContent = '✓ Uploaded';
  } catch {
    toast('Upload failed — check connection');
    btn.textContent = 'Retry upload';
    btn.disabled = false;
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

document.getElementById('pinInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
setInterval(() => { if(document.getElementById('appScreen').style.display === 'block') loadJobs(); }, 60000);
</script>
</body>
</html>
